<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Investor | Historia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h4 class="fw-bold mb-5 text-white pe-3"><i class="bi bi-graph-up-arrow text-danger"></i> INVESTOR</h4>
        <nav class="nav flex-column">
            <a class="nav-link" href="/"><i class="bi bi-grid-fill me-3"></i> Dashboard</a>
            <a class="nav-link" href="/admin"><i class="bi bi-person-lock me-3"></i> Panel Administratora</a>
            <a class="nav-link active" href="/historia-widok"><i class="bi bi-clock-history me-3"></i> Historia</a>
            <a class="nav-link" href="/docs"><i class="bi bi-terminal me-3"></i> API</a>
        </nav>
    </div>
    <div class="main-content">
        <h1 class="fw-bold mb-5">Dziennik Transakcji</h1>
        <div class="table-container">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>DATA OPERACJI</th>
                        <th>AKTYWO</th>
                        <th>ILOŚĆ</th>
                        <th>CENA JEDNOSTKOWA</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t, a in history %}
                    <tr style="border-bottom: 1px solid #1a1a1a">
                        <td class="text-light opacity-75" style="font-family: monospace;">
                            {{ t.created_at.strftime('%Y-%m-%d | %H:%M') }}
                        </td>
                        <td>
                            <span class="badge-ticker me-2">{{ a.ticker }}</span>
                            <span class="fw-bold text-white">{{ a.name }}</span>
                        </td>
                        <td class="text-white">{{ t.amount }}</td>
                        <td class="fw-bold text-danger">{{ t.price_at_date }} zł</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
